name: Elixir CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: '1.17'
            otp: '27'
          - elixir: '1.18'
            otp: '28'
          - elixir: '1.19'
            otp: '28'
    env:
      MIX_ENV: test
    steps:
    - uses: actions/checkout@v4
    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ matrix.elixir }}
        otp-version: ${{ matrix.otp }}
    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: deps
        key: ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-mix-${{ hashFiles('**/mix.lock') }}
        restore-keys: ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-mix-
    - name: Install dependencies
      run: mix deps.get --only test
    - name: Compile
      run: mix compile --warnings-as-errors
    - name: Run tests
      run: mix test

  lint:
    name: Lint and static analysis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    # Keep the lint Elixir version in sync with .tool-versions: the formatter
    # output differs across Elixir versions.
    - name: Set up Elixir
      id: beam
      uses: erlef/setup-beam@v1
      with:
        elixir-version: '1.19'
        otp-version: '28'
    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: deps
        key: ${{ runner.os }}-lint-mix-${{ hashFiles('**/mix.lock') }}
        restore-keys: ${{ runner.os }}-lint-mix-
    - name: Install dependencies
      run: mix deps.get
    - name: Check formatting
      run: mix format --check-formatted
    - name: Check unused dependencies
      run: mix deps.unlock --check-unused
    - name: Check for retired dependencies
      run: mix hex.audit
    - name: Run Credo
      run: mix credo --strict
    - name: Restore PLT cache
      uses: actions/cache@v4
      with:
        path: _build/dev/*.plt*
        key: ${{ runner.os }}-plt-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: ${{ runner.os }}-plt-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-
    - name: Run Dialyzer
      run: mix dialyzer
